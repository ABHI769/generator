<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Price Finder</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-badge">Live online pricing</div>
      <h1>Vehicle Price Finder</h1>
      <p>Enter vehicle details and get an estimated price based on publicly available online listings.</p>
    </header>

    <main class="layout">
      <section class="card form-card">
        <h2>Vehicle Details</h2>
        <form id="price-form">
          <label>
            Brand / Name
            <input type="text" name="name" placeholder="e.g. Honda, Royal Enfield, Toyota" required>
          </label>

          <label>
            Model
            <input type="text" name="model" placeholder="e.g. Activa 6G, Classic 350, Fortuner" required>
          </label>

          <label>
            Vehicle Type
            <select name="vehicle_type" required>
              <option value="">Select type</option>
              <option value="Bike">Bike / Motorcycle</option>
              <option value="Scooter">Scooter</option>
              <option value="Car">Car</option>
              <option value="SUV">SUV</option>
              <option value="Electric Vehicle">Electric Vehicle</option>
              <option value="Commercial Vehicle">Commercial Vehicle</option>
            </select>
          </label>

          <label>
            Owner
            <select name="owner" required>
              <option value="1st owner">1st owner</option>
              <option value="2nd owner">2nd owner</option>
              <option value="3rd owner">3rd owner</option>
              <option value="4th+ owner">4th+ owner</option>
            </select>
          </label>

          <button type="submit" id="submit-btn">
            <span class="btn-text">Get Price</span>
            <span class="btn-loader hidden"></span>
          </button>
        </form>
      </section>

      <section class="card result-card hidden" id="result-card">
        <h2>Estimated Price</h2>
        <div id="result-content"></div>
      </section>

      <section class="card error-card hidden" id="error-card">
        <h2>Unable to estimate</h2>
        <p id="error-message"></p>
      </section>
    </main>

    <footer>
      <p>Prices are estimates from online sources. Actual market value may vary by condition, location, and mileage.</p>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
